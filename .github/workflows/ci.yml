name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make libcmocka-dev
      
      - name: Build shell
        run: make

      - name: Build web
        run: make web

      - name: Tests
        run: make test
